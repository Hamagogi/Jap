name: Update KBO data

on:
  schedule:
    # Daily at 23:00 UTC (08:00 KST next day)
    - cron: "0 23 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run fetcher
        run: node scripts/fetch-kbo.mjs

      - name: Commit if changed
        run: |
          if [[ -n "$(git status --porcelain data/)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data/
            git commit -m "chore: refresh KBO data ($(date -u +%F))"
            git push
          else
            echo "No changes."
          fi
